<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      color: inherit;
      text-decoration: none;
      font-family: inherit;
      font-size: inherit;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-content: center;

      font-family: sans-serif;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
    }

    body>header {
      position: fixed;
      inset: 0;
      inset-block-end: auto;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;

      @media (max-width: 768px) {
        flex-direction: column;
        align-items: start;
      }

      &>div {
        display: flex;
        align-items: center;
        gap: 1rem;

        @media (max-width: 768px) {
          flex-direction: column;
          align-items: start;

          &:first-child {
            flex-direction: row;
            width: 100%;
            justify-content: space-between;
          }

          &[aria-expanded="false"] {
            display: none;
          }
        }

        &>h1 {
          font-size: 1.5rem;
        }

        &>button {
          place-content: center;

          padding-inline: 0.5rem;
          width: fit-content;
          height: 100%;

          display: none;

          @media (max-width: 768px) {
            display: grid;
          }
        }

        &>a {
          font-size: 0.875rem;
        }
      }

    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;

      width: 20rem;

      font-size: 1rem;


      &>div {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;

        &>label {
          margin-inline: 1rem;
          font-size: 0.875rem;
        }

        &>div.input-field {
          display: flex;
          align-items: center;

          border: 1px solid black;
          border-radius: 100rem;
          overflow: hidden;

          &>input {
            border: none;

            width: 100%;
            padding: 1rem;

            &:focus {
              outline: none;
            }
          }

          &>button {
            display: grid;
            place-content: center;

            width: fit-content;
            height: 100%;
            padding-inline: 1rem;
          }
        }

        &>button[type="submit"] {
          border-radius: 100rem;
          background-color: black;
          color: white;

          width: 100%;
          padding: 1rem;
          margin-block: 1rem;
        }
      }

    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Company</h1>
      <button type="button" aria-label="Navigation menu">
        <i data-feather="menu"></i>
      </button>
    </div>

    <div aria-expanded="false">
      <a href="#">Login</a>
      <a href="#">Sign Up</a>
    </div>
  </header>

  <main>
    <form>
      <div>
        <label for="password">Password</label>
        <div class="input-field">
          <input type="password" name="password" id="password" autocomplete="new-password">
          <button type="button" aria-label="Toggle password visibility">
            <i data-feather="eye"></i>
          </button>
        </div>
      </div>
      <div>
        <label for="password-confirm">Confirm Password</label>
        <div class="input-field">
          <input type="password" name="password-confirm" id="password-confirm" autocomplete="new-password">
          <button type="button" aria-label="Toggle password visibility">
            <i data-feather="eye"></i>
          </button>
        </div>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </main>

  <script>
    feather.replace();

    const inputPassword = document.querySelector('input[name="password"]');
    const inputPasswordConfirm = document.querySelector('input[name="password-confirm"]');

    function updatePasswordVisibility(passwordInput, visibilityToggle) {
      const isPasswordVisible = passwordInput.type === 'text';

      passwordInput.type = isPasswordVisible ? 'password' : 'text';
      visibilityToggle.innerHTML = `<i data-feather="${isPasswordVisible ? 'eye' : 'eye-off'}"></i>`;

      feather.replace();
    };

    inputPassword.nextElementSibling.addEventListener('click', () => {
      updatePasswordVisibility(inputPassword, inputPassword.nextElementSibling);
    });
    inputPasswordConfirm.nextElementSibling.addEventListener('click', () => {
      updatePasswordVisibility(inputPasswordConfirm, inputPasswordConfirm.nextElementSibling);
    });

    const navToggle = document.querySelector('header>div:first-child>button');
    const navMenu = document.querySelector('header>div[aria-expanded]');
    navToggle.addEventListener('click', () => {
      const isNavMenuExpanded = navMenu.getAttribute('aria-expanded') === 'true';
      navMenu.setAttribute('aria-expanded', String(!isNavMenuExpanded));
    });
  </script>
</body>

</html>
