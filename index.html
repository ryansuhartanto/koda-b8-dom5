<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-content: center;

      font-family: system-ui, sans-serif;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;

      width: 20rem;

      font-size: 1rem;


      &>div {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;

        &>label {
          margin-inline: 1rem;
          font-size: 0.875rem;
        }

        &>div.input-field {
          display: flex;
          align-items: center;

          border: 1px solid black;
          border-radius: 100rem;
          overflow: hidden;

          &>input {
            border: none;
            font-size: inherit;

            width: 100%;
            padding: 1rem;

            &:focus {
              outline: none;
            }
          }

          &>button {
            background: none;
            border: none;
            display: grid;
            place-content: center;
            font-size: inherit;

            width: fit-content;
            height: 100%;
            padding-inline: 1rem;
          }
        }
      }
    }
  </style>
</head>

<body>
  <form>
    <div>
      <label for="password">Password</label>
      <div class="input-field">
        <input type="password" name="password" id="password" autocomplete="current-password">
        <button type="button" aria-label="Toggle password visibility">
          <i data-feather="eye"></i>
        </button>
      </div>
    </div>
  </form>

  <script>
    feather.replace();

    const inputPassword = document.querySelector('input[name="password"]');

    function updatePasswordVisibility(passwordInput, visibilityToggle) {
      const isPasswordVisible = passwordInput.type === 'text';

      passwordInput.type = isPasswordVisible ? 'password' : 'text';
      visibilityToggle.innerHTML = `<i data-feather="${isPasswordVisible ? 'eye' : 'eye-off'}"></i>`;

      feather.replace();
    };

    inputPassword.nextElementSibling.addEventListener('click', () => {
      updatePasswordVisibility(inputPassword, inputPassword.nextElementSibling);
    });
  </script>
</body>

</html>
